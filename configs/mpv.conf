# ─────────────────────────────────────────────────────────────
# mpv.conf for Glass Player (libmpv embedded rendering)
# Critical settings (vo, force-window) are enforced
# by the native addon and cannot be overridden here.
# ─────────────────────────────────────────────────────────────

# ── Video Quality ─────────────────────────────────────────────
profile=high-quality
# vo is set to libmpv by the native addon — do not set here

# ── Hardware Decoding ─────────────────────────────────────────
hwdec=videotoolbox
hwdec-codecs=all

# ── Scaling (Anime / General) ────────────────────────────────
scale=ewa_lanczossharp
cscale=mitchell
dscale=mitchell
dither-depth=auto

# ── Debanding ─────────────────────────────────────────────────
deband=no
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=4

# ── Audio (Dolby Atmos / Spatial Audio) ───────────────────────
ao=avfoundation
volume-max=200
audio-channels=auto
audio-spdif=ac3,eac3,truehd,dts-hd
# auto: preserves full source channel layout (7.1.4 for Atmos)
# audio-spdif: bitstream passthrough for Atmos TrueHD / DD+ / DTS:X over HDMI/eARC
# For AirPods / HomePod / Built-in speakers: macOS renders spatial audio from multichannel PCM

# ── No UI (Electron handles everything) ──────────────────────
osc=no
osd-bar=no
border=no
cursor-autohide=always

# ── Behavior ──────────────────────────────────────────────────
keep-open=yes
keep-open-pause=yes
idle=yes
# force-window is disabled by the native addon (libmpv has no window)

# ── Languages ─────────────────────────────────────────────────
alang=eng,en,jpn,jp
slang=eng,en,enUS

# ── Resume ────────────────────────────────────────────────────
save-position-on-quit=yes

# ── Network / Streaming ──────────────────────────────────────
network-timeout=60
force-seekable=yes
hr-seek=no
stream-lavf-o=fflags=+fastseek

# ── Cache ─────────────────────────────────────────────────────
cache=yes
demuxer-max-bytes=2000MiB
demuxer-max-back-bytes=500MiB
demuxer-readahead-secs=60
cache-secs=120

# ── Color & Display P3 Wide Gamut ─────────────────────────────
# Render in Display P3 gamut (MacBook Pro's native panel gamut).
# No target-trc is set — mpv uses the default gamma for SDR,
# giving maximum brightness and color fidelity.
target-prim=display-p3

# ── HDR & Dolby Vision ───────────────────────────────────────
# This conditional profile ONLY activates for HDR/HLG/DV content.
# It applies tone mapping to convert HDR → SDR range with best quality.
# profile-restore=copy ensures ALL settings revert when switching
# back to SDR, preventing the "dark SDR" problem.
# Dolby Vision: decoded by VideoToolbox (hwdec=videotoolbox).

[hdr-dv]
profile-desc="HDR / Dolby Vision content"
profile-cond=get("video-params/gamma") == "pq" or get("video-params/gamma") == "hlg" or get("video-params/primaries") == "bt.2020"
profile-restore=copy

# Tone mapping HDR → P3 SDR with maximum quality
tone-mapping=spline
hdr-compute-peak=yes
target-peak=auto
gamut-mapping-mode=perceptual
