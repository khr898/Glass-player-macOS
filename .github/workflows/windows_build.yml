name: Windows Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: ${{ matrix.arch == 'arm64' && 'win64_msvc2019_arm64' || 'win64_msvc2019_64' }}

    # MPV dependencies are now bundled in the vendor/mpv-dev directory
    # so we don't need to download them at runtime.

    - name: Configure CMake
      run: >
        cmake -S windows -B windows/build
        -DCMAKE_BUILD_TYPE=Release
        -G "Ninja"

    - name: Build
      run: cmake --build windows/build --config Release

    - name: Copy dependencies for packaging
      if: matrix.arch == 'x64'
      run: |
        copy vendor/mpv-dev/libmpv-2.dll windows/build/
        # Qt dependencies would be deployed here using windeployqt
        windeployqt --no-translations --no-opengl-sw --release windows/build/GlassPlayer.exe

    - name: Package Installer
      working-directory: windows/build
      run: cpack -G NSIS

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GlassPlayer-Windows-${{ matrix.arch }}
        path: windows/build/GlassPlayer-*.exe
