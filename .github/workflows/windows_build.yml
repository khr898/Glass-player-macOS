name: Cross-platform Build

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: windows
            arch: x64
            qt_arch: win64_msvc2019_64
            artifact_name: GlassPlayer-Windows-x64-installer
            mpv_dll: vendor/mpv-dev/x64/libmpv-2.dll
          - name: Windows ARM64
            runner: windows-latest
            target: windows
            arch: ARM64
            qt_arch: win64_msvc2019_arm64
            artifact_name: GlassPlayer-Windows-arm64-installer
            mpv_dll: vendor/mpv-dev/arm64/libmpv-2.dll
          - name: macOS arm64
            runner: macos-14
            target: macos
            artifact_name: GlassPlayer-macOS-arm64-dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        if: matrix.target == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Qt
        if: matrix.target == 'windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}

      - name: Configure CMake (Windows)
        if: matrix.target == 'windows'
        run: >
          cmake -S windows -B build-win-${{ matrix.arch }}
          -G "Visual Studio 17 2022"
          -A ${{ matrix.arch }}

      - name: Build (Windows)
        if: matrix.target == 'windows'
        run: cmake --build build-win-${{ matrix.arch }} --config Release

      - name: Deploy runtime (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.mpv_dll }}" "build-win-${{ matrix.arch }}\\Release\\libmpv-2.dll" -Force
          windeployqt --release --no-translations --no-opengl-sw "build-win-${{ matrix.arch }}\\Release\\GlassPlayer.exe"

      - name: Package standalone installer (Windows)
        if: matrix.target == 'windows'
        run: cpack --config build-win-${{ matrix.arch }}/CPackConfig.cmake -C Release -G NSIS

      - name: Install mpv (macOS)
        if: matrix.target == 'macos'
        run: brew install mpv

      - name: Build app bundle (macOS arm64)
        if: matrix.target == 'macos'
        run: |
          cd macOS/GlassPlayer
          chmod +x build.sh
          NO_INSTALL=1 SKIP_SIGN=1 CREATE_DMG=1 BUILD_PROFILE=optimized ./build.sh

      - name: Upload artifact (Windows)
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build-win-${{ matrix.arch }}/GlassPlayer-*.exe

      - name: Upload artifact (macOS)
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: macOS/GlassPlayer/build/optimized/GlassPlayer.dmg
