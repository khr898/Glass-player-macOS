# ═══════════════════════════════════════════════════════════════════════
# Glass Player — Unified Cross-platform Release Build
# ═══════════════════════════════════════════════════════════════════════
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    name: Determine Target Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Tag Version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            git fetch --tags --force
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2.2.07042026")
          fi
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"
          echo "Resolved tag: $TAG_NAME"

  build:
    name: Build (${{ matrix.name }})
    needs: get-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: windows
            arch: x64
            arch_lower: x64
            msvc_arch: amd64
            artifact_name: GlassPlayer-Windows-x64
          - name: Windows ARM64
            runner: windows-latest
            target: windows
            arch: ARM64
            arch_lower: arm64
            msvc_arch: amd64_arm64
            artifact_name: GlassPlayer-Windows-arm64
          - name: macOS arm64
            runner: macos-26
            target: macos
            artifact_name: GlassPlayer-macOS-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── Windows Build Strategy ──────────────────────────────────────────
      - name: Set up MSVC (${{ matrix.arch }})
        if: matrix.target == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Set up MSBuild
        if: matrix.target == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        if: matrix.target == 'windows'
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages (Windows)
        if: matrix.target == 'windows'
        run: nuget restore windows/GlassPlayer.vcxproj -PackagesDirectory $env:USERPROFILE/.nuget/packages

      - name: Download libmpv + ANGLE (Windows ${{ matrix.arch }})
        if: matrix.target == 'windows'
        run: python windows/download_dependencies.py --arch ${{ matrix.arch_lower }}

      - name: Build Release (Windows ${{ matrix.arch }})
        if: matrix.target == 'windows'
        run: >
          msbuild windows/GlassPlayer.vcxproj
          /p:Configuration=Release
          /p:Platform=${{ matrix.arch }}
          /p:AppVersion=${{ needs.get-version.outputs.version }}
          /m /v:m

      - name: Stage dist (Windows ${{ matrix.arch }})
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path windows/dist | Out-Null

          # MSBuild output (exe + self-contained WinAppSDK runtime)
          Copy-Item -Path "build/$arch/Release/*" -Destination windows/dist/ -Recurse -Force

          # Vendor DLLs: libmpv and ANGLE
          Copy-Item -Path "vendor/mpv-dev/$arch/libmpv-2.dll"   -Destination windows/dist/ -Force
          Copy-Item -Path "vendor/angle/$arch/bin/libEGL.dll"    -Destination windows/dist/ -Force
          Copy-Item -Path "vendor/angle/$arch/bin/libGLESv2.dll" -Destination windows/dist/ -Force

      - name: Compile Inno Setup Installer (Windows ${{ matrix.arch }})
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          iscc /DAppVersion="${{ needs.get-version.outputs.version }}" /DSourceDir="dist" /DAppArch="${{ matrix.arch }}" windows/installer.iss

      # ─── macOS Build Strategy ─────────────────────────────────────────────
      - name: Install mpv (macOS)
        if: matrix.target == 'macos'
        run: brew install mpv

      - name: Set App Version in Info.plist (macOS)
        if: matrix.target == 'macos'
        run: |
          plutil -replace CFBundleShortVersionString -string "${{ needs.get-version.outputs.version }}" macOS/GlassPlayer/Info.plist

      - name: Build App & Generate DMG Bundle (macOS)
        if: matrix.target == 'macos'
        run: |
          cd macOS/GlassPlayer
          chmod +x build.sh
          NO_INSTALL=1 SKIP_SIGN=1 CREATE_DMG=1 BUILD_PROFILE=optimized ./build.sh

      - name: Rename DMG Package (macOS)
        if: matrix.target == 'macos'
        run: |
          mv macOS/GlassPlayer/build/optimized/GlassPlayer.dmg macOS/GlassPlayer/build/optimized/GlassPlayer-${{ needs.get-version.outputs.version }}-macOS-arm64.dmg

      # ─── Upload Artifacts ────────────────────────────────────────────────
      - name: Upload Windows Installer Artifact
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: windows/GlassPlayer-*.exe

      - name: Upload macOS DMG Artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: macOS/GlassPlayer/build/optimized/GlassPlayer-*.dmg

  release:
    name: Create/Update GitHub Release
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display Downloaded Files
        run: find artifacts -type f

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          name: Glass Player ${{ needs.get-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
          body: |
            ## Glass Player ${{ needs.get-version.outputs.version }}

            ### Installation
            - **macOS (Apple Silicon)**: Download `GlassPlayer-${{ needs.get-version.outputs.version }}-macOS-arm64.dmg`
            - **Windows x64**: Download `GlassPlayer-${{ needs.get-version.outputs.version }}-Windows-x64.exe`
            - **Windows ARM64**: Download `GlassPlayer-${{ needs.get-version.outputs.version }}-Windows-ARM64.exe`

            ### Requirements
            - **macOS**: macOS 14.0 (Sonoma) or later
            - **Windows**: Windows 10/11 64-bit